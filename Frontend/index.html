<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Travellex organizes Africa-focused tours and adventure travel with a simple trip planning and inquiry flow."
    >
    <meta name="theme-color" content="#0b1320">
    <link rel="icon" type="image/png" href="/src/assets/photos/Travellex-favicon.png">
    <link rel="apple-touch-icon" href="/src/assets/photos/Travellex-favicon.png">
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem("travellex_theme");
          var systemTheme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          var theme = storedTheme || systemTheme;
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (error) {
          document.documentElement.dataset.theme = "light";
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        theme: {
          extend: {
            colors: {
              travellex: {
                forest: "#0b1320",
                deep: "#070d16",
                leaf: "#047857",
                lagoon: "#0e7490",
                clay: "#b87333",
                gold: "#c8a24a",
                sand: "#f5f7f8",
                paper: "#ffffff"
              }
            },
            boxShadow: {
              safari: "0 22px 60px rgba(11, 19, 32, 0.12)"
            }
          }
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Travellex</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
