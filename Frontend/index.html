      {
        "@context": "https://schema.org",
        "@graph": [

            "publisher": { "@id": "https://travellex.tours/#organization" },
            "potentialAction": {
              "@type": "SearchAction",

              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem("travellex_theme");
          var systemTheme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          var theme = storedTheme || systemTheme;
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (error) {
          document.documentElement.dataset.theme = "light";
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
    <script>
      window.tailwind = window.tailwind || {};

              }
